[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Disable treating warnings as errors (fixes 99% of React/Vite Netlify failures)
  CI = "false"
  # Force modern Node.js version to support Vite
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
